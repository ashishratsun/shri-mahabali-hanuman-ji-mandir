<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Shri Mahabali Hanuman Ji Mandir</title>

<link rel="stylesheet" href="style.css">

<style>

.gallery-section{
padding:120px 8% 60px;
background:#fff8ef;
}

.gallery-title{
text-align:center;
font-size:45px;
color:#ff6a00;
margin-bottom:50px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:280px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
transition:.4s;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.gallery img:hover{
transform:scale(1.05);
}

/* Lightbox */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:99999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;
}

</style>

</head>
<body>

<header>

<div class="logo">
🛕 Shri Mahabali Hanuman Ji Mandir
</div>

<nav>
<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>
</nav>

</header>

<section class="gallery-section">

<h1 class="gallery-title">
📸 मंदिर फोटो गैलरी
</h1>

<div class="gallery">

<img src="hanumanji1.jpeg">
<img src="hanumanji2.jpeg">
<img src="hanumanji3.jpeg">
<img src="hanumanji4.jpeg">
<img src="hanumanji5.jpeg">
<img src="dadi ji.jpg">

</div>

</section>

<div class="lightbox" id="lightbox">

<span class="close">&times;</span>

<img id="lightbox-img">

</div>

<script>

const images=document.querySelectorAll('.gallery img');

const lightbox=document.getElementById('lightbox');

const lightboxImg=document.getElementById('lightbox-img');

images.forEach(img=>{

img.addEventListener('click',()=>{

lightbox.style.display='flex';

lightboxImg.src=img.src;

});

});

document.querySelector('.close').onclick=()=>{

lightbox.style.display='none';

}

lightbox.onclick=()=>{

lightbox.style.display='none';

}

</script>

</body>
</html>
