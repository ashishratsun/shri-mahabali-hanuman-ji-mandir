<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | श्री महाबली हनुमान जी मंदिर</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .gallery-section {
            padding: 100px 5% 80px;
            background: #fff8ef;
        }
        .gallery-title {
            text-align: center;
            font-size: 42px;
            color: #ff6a00;
            margin-bottom: 50px;
        }

        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid-item {
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.18);
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
        }

        .grid-item:hover {
            transform: scale(1.06);
            box-shadow: 0 15px 30px rgba(255,106,0,0.3);
        }

        .grid-item img, .grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Video Play Icon */
        .grid-item.video::after {
            content: "▶";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.7);
            z-index: 2;
            opacity: 0.9;
        }

        /* Lightbox (Phone Style) */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 99999;
        }

        .lightbox-content {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox img, .lightbox video {
            max-width: 100%;
            max-height: 92%;
            object-fit: contain;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 42px;
            color: white;
            cursor: pointer;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-counter {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 17px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .grid-gallery {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px;
            }
            .grid-item img, .grid-item video {
                height: 180px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🛕 Shri Mahabali Hanuman Ji Mandir</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="history.html">History</a>
        <a href="gallery.html">Gallery</a>
    </nav>
</header>

<section class="gallery-section">
    <h1 class="gallery-title">📸 मंदिर फोटो गैलरी</h1>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <div class="lightbox-content">
        <span class="close">&times;</span>
        <div class="lightbox-counter" id="counter">1 / 50</div>
        <img id="lightbox-img">
        <video id="lightbox-video" controls muted></video>

];

const grid = document.getElementById('grid');
let currentIndex = 0;

mediaFiles.forEach((media, index) => {
    const div = document.createElement('div');
    div.className = `grid-item ${media.type}`;
    
    if (media.type === "image") {
        div.innerHTML = `<img src="${media.src}" alt="Hanuman Ji">`;
    } else {
        div.innerHTML = `<video src="${media.src}" muted></video>`;
    }
    
    div.addEventListener('click', () => openLightbox(index));
    grid.appendChild(div);
});

// Lightbox
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxVideo = document.getElementById('lightbox-video');
const counter = document.getElementById('counter');

function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    lightbox.style.display = 'flex';
}

function updateLightbox() {
    const media = mediaFiles[currentIndex];
    counter.textContent = `${currentIndex + 1} / ${mediaFiles.length}`;

    if (media.type === "image") {
        lightboxImg.src = media.src;
        lightboxImg.style.display = 'block';
        lightboxVideo.style.display = 'none';
    } else {
        lightboxVideo.src = media.src;
        lightboxVideo.style.display = 'block';
        lightboxImg.style.display = 'none';
    }
}

// Close
document.querySelector('.close').onclick = () => {
    lightbox.style.display = 'none';
    lightboxVideo.pause();
};

// Swipe
let touchStartX = 0;
lightbox.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
lightbox.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (diff > 80 && currentIndex < mediaFiles.length - 1) {
        currentIndex++;
        updateLightbox();
    } else if (diff < -80 && currentIndex > 0) {
        currentIndex--;
        updateLightbox();
    }
});
</script>

</html>
